<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" href="./assets/image/JoJo.png" type="image/x-icon">
    <link rel="stylesheet" href="./assets/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <title>Porfolio</title>
</head>
<body>
    <main>
        <aside class="sidebar" data-sidebar>
            <div class="sidebar-info">
                <figure class="avatar-box">
                    <img src="./assets/image/AvatarRespaldo.png" alt="Albert Junior" width="80">
                </figure>
                <div class="info-content">
                    <h1 class="name" title="Albert Junior">Albert Junior</h1>
                    <p class="title">Web developer</p>
                </div>
                <button class="info_more-btn" data-sidebar-btn>
                    <span> Snow Contacts</span>
                    <ion-icon name="chevron-down"></ion-icon>
                </button>
            </div>
            <div class="sidebar-info_more">
                <div class="separator"></div>
                <ul class="contacts-list">
                    <li class="contact-item">
                        <div class="icon-box">
                            <ion-icon name="mail-outline"></ion-icon>
                        </div>
                        <div class="contact-info">
                            <p class="contact-title">Email</p>
                            <a href="albertjunior554@gmail.com" class="contact-link">albertjunior554@gmail.com</a>
                        </div>
                    </li>
                    <li class="contact-item">
                        <div class="icon-box">
                            <ion-icon name="phone-portrait-outline"></ion-icon>
                        </div>
                        <div class="contact-info">
                            <p class="contact-title">Phone</p>
                            <a href="tel:+18099742138" class="contact-link">+1 (809)-974-2138</a>
                        </div>
                    </li>
                    <li class="contact-item">
                        <div class="icon-box">
                          <ion-icon name="calendar-outline"></ion-icon>
                        </div>
                        <div class="contact-info">
                          <p class="contact-title">Birthday</p>
                          <time datetime="2003-12-09">December 9, 2003</time>
                        </div>
                      </li>
                      <li class="contact-item">
                        <div class="icon-box">
                          <ion-icon name="location-outline"></ion-icon>
                        </div>
                        <div class="contact-info">
                          <p class="contact-title">Location</p>
                          <address>Santo Domingo, Dominican Republic</address>
                        </div>
                      </li>
                </ul>
                <div class="separator"></div>
                <ul class="social-list">
                    <li class="social-item">
                      <a href="#" class="social-link">
                        <ion-icon name="logo-facebook"></ion-icon>
                      </a>
                    </li>
                    <li class="social-item">
                      <a href="#" class="social-link">
                        <ion-icon name="logo-twitter"></ion-icon>
                      </a>
                    </li>
                    <li class="social-item">
                      <a href="#" class="social-link">
                        <ion-icon name="logo-instagram"></ion-icon>
                      </a>
                    </li>
                  </ul>
            </div>
        </aside>
    </main>

    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>
